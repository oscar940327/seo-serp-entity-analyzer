<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SEO SERP Entity Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="container">
    <h1>SEO SERP Entity Analyzer</h1>

    <section id="loginSection">
      <input id="usernameInput" type="text" autocomplete="username" placeholder="帳號" />
      <input id="passwordInput" type="password" autocomplete="current-password" placeholder="密碼" />
      <button id="loginButton">登入</button>
      <p id="loginStatus"></p>
    </section>

    <section id="appSection" class="hidden">
      <div class="toolbar">
        <span id="userLabel"></span>
        <button id="logoutButton" type="button">登出</button>
      </div>

      <input id="keywordInput" type="text" placeholder="請輸入關鍵字，例如：4G 吃到飽" />
      <button id="runButton">Run SERP Analysis</button>

      <p id="status"></p>
    </section>

  </main>

  <script src="script.js"></script>
</body>

</html>
